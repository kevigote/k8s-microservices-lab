name: Build and Push Containers

# Trigger the workflow on push to main and feature_microservice branches
on:
  push:
    branches:
      - main
      - feature_microservice

jobs:
  
  build:
    
    # Github linux runner
    runs-on: 
      # - ubuntu-latest
      - self-hosted
      - windows
      - minikube

    permissions:
      contents: read
      packages: write

    steps:

      # Download repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Authenticate with GitHub Container Registry
      - name: Authenticate with GitHub Container Registry
        uses: docker/login-action@v3
        with:
          
          # GitHub registry URL
          registry: ghcr.io

          # Current GitHub user
          username: ${{ github.actor }}

          # Github auto-generated token for authentication
          password: ${{ secrets.GITHUB_TOKEN }}

      #========================================
      # Backend Image
      #========================================

      # Build backend Docker image
      - name: Build Backend Image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/backend-api:latest ./backend
      
      # Push backend Docker image to GitHub Container Registry
      - name: Push Backend Image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/backend-api:latest
      
      #========================================
      # Frontend Image
      #========================================

      # Build frontend Docker image
      - name: Build Frontend Image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/frontend-app:latest ./frontend

      # Push frontend Docker image to GitHub Container Registry
      - name: Push Frontend Image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/frontend-app:latest

      #========================================
      # Deploy Kubernetes Resources
      #========================================
      
      # Deploy Kubernetes resources using kubectl
      # Restart deployments to pull the latest images and check rollout status
      # Finally, get the status of pods and ingress resources

      - name: Deploy Kubernetes Resources
        shell: powershell
        run: |
          kubectl apply -f k8s/
          kubectl rollout restart deployment/backend-deployment
          kubectl rollout restart deployment/frontend-deployment
          kubectl rollout status deployment/backend-deployment
          kubectl rollout status deployment/frontend-deployment
          kubectl get pods
          kubectl get ingress