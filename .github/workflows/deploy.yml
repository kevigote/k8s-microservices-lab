name: CI/CD Pipeline for Kubernetes Microservices Lab

# Trigger the workflow on push to main and feature_microservice branches
on:
  push:
    branches:
      - main
      - feature_microservice

jobs:
  
  build:
    
    # Github linux runner
    runs-on: 
      # - ubuntu-latest
      - self-hosted
      - windows
      - minikube

    permissions:
      contents: read
      packages: write

    steps:

      # Download repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Reset Docker context to Desktop deamon before building and pushing images to GitHub Container Registry
      - name: Reset Docker Context
        run: |
          docker context use default
          docker context ls
          docker version

      # Authenticate with GitHub Container Registry
      - name: Authenticate with GitHub Container Registry
        uses: docker/login-action@v3
        with:
          
          # GitHub registry URL
          registry: ghcr.io

          # Current GitHub user
          username: ${{ github.actor }}

          # Github auto-generated token for authentication
          password: ${{ secrets.GITHUB_TOKEN }}

      #========================================
      # Backend Image
      #========================================

      # Build backend Docker image with both commit SHA and latest tags for pushing to GitHub Container Registry
      - name: Build Backend Image
        shell: powershell
        run: |
          docker build `
          -t ghcr.io/${{ github.repository_owner }}/backend-api:${{ github.sha }} `
          -t ghcr.io/${{ github.repository_owner }}/backend-api:latest `
          ./backend
      
      # Push backend Docker image to GitHub Container Registry
      - name: Push Backend Image
        shell: powershell
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/backend-api:${{ github.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/backend-api:latest
      
      #========================================
      # Frontend Image
      #========================================

      # Build frontend Docker image with both commit SHA and latest tags for pushing to GitHub Container Registry
      - name: Build Frontend Image
        shell: powershell
        run: |
          docker build `
          -t ghcr.io/${{ github.repository_owner }}/frontend-app:${{ github.sha }} `
          -t ghcr.io/${{ github.repository_owner }}/frontend-app:latest `
          ./frontend
      # Push frontend Docker image to GitHub Container Registry
      - name: Push Frontend Image
        shell: powershell
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/frontend-app:${{ github.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/frontend-app:latest

      #========================================
      # Deploy Kubernetes Resources
      #========================================
      
      # Verify connectivity to Kubernetes cluster and check cluster status, nodes, and kubectl version
      - name: Verify Cluster
        shell: powershell
        run: |
          kubectl cluster-info
          kubectl get nodes
          kubectl version --short

      # Deploy Kubernetes resources using kubectl
      # Update deployments to use the new registry images with the commit SHA tag
      # Restart deployments to pull the latest images and check rollout status
      # Finally, get the status of pods and ingress resources
      - name: Deploy Kubernetes Resources
        shell: powershell
        run: |
          kubectl apply -f k8s/

          kubectl set image deployment/backend-deployment `
          backend=ghcr.io/${{ github.repository_owner }}/backend-api:${{ github.sha }}

          kubectl set image deployment/frontend-deployment `
          frontend=ghcr.io/${{ github.repository_owner }}/frontend-app:${{ github.sha }}

          kubectl rollout status deployment/backend-deployment

          kubectl rollout status deployment/frontend-deployment

          kubectl get pods

          kubectl get ingress

          kubectl describe pod -l app=backend