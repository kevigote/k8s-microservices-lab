name: CD Pipeline

# Deploy ONLY after CI finishes
on:
  workflow_run:
    workflows:
      - CI Pipeline
    types:
      - completed

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'

    runs-on:
      - self-hosted
      - windows
      - minikube

    permissions:
      contents: read
      packages: read

    steps:

      # Download repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      ################################
      # Cluster Validation
      ################################
      # Verify connectivity to Kubernetes cluster and check cluster status, nodes, and kubectl version  
      - name: Verify Cluster
        shell: powershell
        run: |
          kubectl cluster-info
          kubectl get nodes
          kubectl version

      ################################
      # Deploy
      ################################
      # Deploy Kubernetes resources using kubectl
      # Update deployments to use the new registry images with the commit SHA tag
      # Restart deployments to pull the latest images and check rollout status
      # Finally, get the status of pods and ingress resources
      - name: Deploy Kubernetes
        shell: powershell
        run: |

          kubectl apply -f k8s/

          kubectl set image deployment/backend-deployment `
          backend=ghcr.io/${{ github.repository_owner }}/backend-api:latest

          kubectl set image deployment/frontend-deployment `
          frontend=ghcr.io/${{ github.repository_owner }}/frontend-app:latest

          kubectl rollout status deployment/backend-deployment --timeout=120s
          kubectl rollout status deployment/frontend-deployment --timeout=120s

          kubectl get pods -o wide
          kubectl get ingress